name: Ubuntu

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions: read-all

jobs:
  build-gcc:
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-24.04
      compiler: g++-14

  build-clang:
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-24.04
      compiler: clang++-18
